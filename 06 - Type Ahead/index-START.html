<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Type Ahead 👀</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>

  <form class="search-form">
    <input type="text" class="search" placeholder="City or State">
    <ul class="suggestions">
      <li>Filter for a city</li>
      <li>or a state</li>
    </ul>
  </form>
  <script>
    const endpoint = 'https://gist.githubusercontent.com/Miserlou/c5cd8364bf9b2420bb29/raw/2bf258763cdddd704f8ffd3ea9a3e81d25e2c6f6/cities.json';

    const cities = [];

    fetch(endpoint)
      .then(res => res.json())
      .then(data => cities.push(...data))
      .catch(err => console.error(err));

    function findMatches(wordToMatch, cities) {
      const regex = new RegExp(wordToMatch, 'gi');
      return cities.filter(place => {
        return place.city.match(regex) || place.state.match(regex);
      });
    }

    function formatNumber(number) {
      return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    const suggestionsList = document.querySelector('.suggestions');
    const searchInput = document.querySelector('.search');

    searchInput.addEventListener('input', () => {
      const query = searchInput.value;
      if (!query) {
        suggestionsList.innerHTML = `
          <li>Filter for a city</li>
          <li>or a state</li>
        `
        return;
      }
      
      const matches = findMatches(searchInput.value, cities);
      let html;
      if (matches.length === 0) {
        html = `<li>No matches found</li>`;
      } else {
        const regex = new RegExp(searchInput.value, 'gi');
        html = matches.map(place => {
          const cityName = place.city.replace(regex, `<span class="hl">${searchInput.value}</span>`);
          const stateName = place.state.replace(regex, `<span class="hl">${searchInput.value}</span>`);
          return `
          <li>
            <span class="name">${cityName}, ${stateName}</span>
            <span class="population">${formatNumber(place.population)}</span>
            </li>
            `;
        }).join('');
      }
      suggestionsList.innerHTML = html;
    })


  </script>
</body>

</html>
